name: implement
description: "Execute the implementation plan by processing tasks from tasks.md"

inputs:
  - name: context
    description: "Additional implementation context"
    required: false
    default: ""

states:
  initial: check_prereqs

  check_prereqs:
    type: step
    command: "{{.awf.scripts_dir}}/check-prerequisites.sh --require-tasks --include-tasks"
    on_success: scan_checklists
    on_failure: {message: "Prerequisites check failed: {{.states.check_prereqs.Stderr}}", status: 1}

  scan_checklists:
    type: step
    command: |
      FEATURE_DIR=$(echo '{{.states.check_prereqs.Output}}' | grep '^FEATURE_DIR=' | cut -d= -f2-)
      "{{.awf.scripts_dir}}/scan-checklists.sh" "$FEATURE_DIR"
    transitions:
      - when: "states.scan_checklists.Output contains 'CHECKLISTS_INCOMPLETE'"
        goto: warn_checklists
      - goto: build_manifest

  warn_checklists:
    type: step
    command: |
      echo "WARNING: Some checklists have incomplete items."
      echo "Proceeding with implementation anyway."
      echo "{{.states.scan_checklists.Output}}"
    on_success: build_manifest

  build_manifest:
    type: step
    command: |
      FEATURE_DIR=$(echo '{{.states.check_prereqs.Output}}' | grep '^FEATURE_DIR=' | cut -d= -f2-)
      "{{.awf.scripts_dir}}/build-context-manifest.sh" "$FEATURE_DIR"
    on_success: load_plan

  load_plan:
    type: step
    command: |
      FEATURE_DIR=$(echo '{{.states.check_prereqs.Output}}' | grep '^FEATURE_DIR=' | cut -d= -f2-)
      cat "$FEATURE_DIR/plan.md"
    on_success: load_optional

  load_optional:
    type: step
    command: |
      MANIFEST='{{.states.build_manifest.Output}}'
      FEATURE_DIR=$(echo "$MANIFEST" | grep '^FEATURE_DIR=' | cut -d= -f2-)

      echo "=== data-model.md ==="
      if echo "$MANIFEST" | grep -q '^DATA_MODEL=true'; then
        cat "$FEATURE_DIR/data-model.md"
      else
        echo "(not available)"
      fi

      echo ""
      echo "=== contracts/ ==="
      if echo "$MANIFEST" | grep -q '^CONTRACTS=true'; then
        for f in $(find "$FEATURE_DIR/contracts" -maxdepth 1 -type f \( -name '*.md' -o -name '*.yaml' -o -name '*.json' \) 2>/dev/null); do
          echo "--- $(basename "$f") ---"
          cat "$f"
          echo ""
        done
      else
        echo "(not available)"
      fi

      echo ""
      echo "=== research.md ==="
      if echo "$MANIFEST" | grep -q '^RESEARCH=true'; then
        cat "$FEATURE_DIR/research.md"
      else
        echo "(not available)"
      fi

      echo ""
      echo "=== quickstart.md ==="
      if echo "$MANIFEST" | grep -q '^QUICKSTART=true'; then
        cat "$FEATURE_DIR/quickstart.md"
      else
        echo "(not available)"
      fi
    on_success: extract_phases

  extract_phases:
    type: step
    command: |
      FEATURE_DIR=$(echo '{{.states.check_prereqs.Output}}' | grep '^FEATURE_DIR=' | cut -d= -f2-)
      "{{.awf.scripts_dir}}/extract-phases.sh" "$FEATURE_DIR/tasks.md"
    on_success: implement_loop

  implement_loop:
    type: for_each
    items: "{{.states.extract_phases.Output}}"
    max_iterations: 20
    body:
      - execute_phase
    on_complete: done

  execute_phase:
    type: agent
    provider: claude
    prompt_file: "{{.awf.prompts_dir}}/implement/phase.md"
    options:
      allowedTools: "Read,Grep,Glob,Edit,Write,Bash"
      dangerouslySkipPermissions: true
    timeout: 600
    on_failure: {message: "Phase execution failed: {{.states.execute_phase.Stderr}}", status: 1}

  done:
    type: terminal
    status: success
